# Day 09 Lab — Final Worker Contracts
# Dự án: Internal IT Helpdesk Multi-Agent Orchestration

# Quy định chung về State (AgentState):
# Tất cả Workers đều nhận vào và trả về AgentState dictionary.

retrieval_worker:
  role: "Tìm kiếm thông tin từ cơ sở dữ liệu nội bộ (ChromaDB + BM25)."
  input_keys:
    task: "Câu hỏi cần tìm kiếm."
    top_k: "Số lượng chunk cần lấy (mặc định 3)."
  output_keys:
    retrieved_chunks: "List các đoạn văn bản kèm metadata & score."
    retrieved_sources: "List tên các file tài liệu đã tìm thấy."
    history: "Ghi log: [retrieval_worker] retrieved X chunks..."

policy_tool_worker:
  role: "Phân tích quy định công ty và gọi công cụ MCP tra cứu Jira."
  input_keys:
    task: "Câu hỏi của user."
    retrieved_chunks: "Context từ retrieval_worker (nếu có)."
    needs_tool: "True nếu cần gọi MCP."
  output_keys:
    policy_result:
      policy_applies: "boolean (Có áp dụng chính sách hoàn tiền/cấp quyền không?)"
      exceptions_found: "list các ngoại lệ tìm thấy (Flash Sale, Digital...)"
      explanation: "Giải thích lý do áp dụng luật."
    mcp_tools_used: "Danh sách các kết quả từ search_kb hoặc get_ticket_info."
    history: "Ghi log: [policy_tool_worker] called MCP..."

synthesis_worker:
  role: "Tổng hợp câu trả lời cuối cùng chuẩn chuyên gia, có trích dẫn."
  input_keys:
    task: "Câu hỏi gốc."
    retrieved_chunks: "Dữ liệu từ retrieval hoặc MCP."
    policy_result: "Kết quả kiểm tra luật."
  output_keys:
    final_answer: "Câu trả lời đầy đủ, chuyên nghiệp, có tag [tên_file]."
    sources: "Danh sách nguồn tài liệu chính thức."
    confidence: "Mức độ tin cậy từ 0.0 đến 1.0."
    history: "Ghi log: [synthesis_worker] answer generated."
